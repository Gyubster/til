theme: jekyll-theme-chirpy

lang: ko
timezone: Asia/Seoul

# Polyglot 다국어 설정
languages: ["ko", "en"]
default_lang: "ko"
exclude_from_localization: ["javascript", "images", "css", "public", "assets"]
parallel_localization: false
lang_from_path: true

title: "gyubo.dev"
tagline: "백엔드 엔지니어의 실전 기록"
description: >-
  백엔드 엔지니어 심규보의 기술 블로그. 시스템 설계, 장애 대응, 리팩토링 등 실무에서 배운 것들을 기록합니다.

en:
  tagline: "A Backend Engineer's Field Notes"
  description: >-
    David Gyubo Shim's tech blog. Documenting lessons from system design, incident response, and refactoring in production.

url: "https://gyubster.github.io"
baseurl: ""

github:
  username: Gyubster

social:
  name: Gyubo Shim
  email: kyunbo0910@naver.com
  links:
    - https://github.com/Gyubster

avatar: /assets/img/avatar.jpeg

theme_mode:

toc: true

comments:
  provider: giscus
  giscus:
    repo: Gyubster/til
    repo_id: R_kgDOR0p8gA
    category: Announcements
    category_id: DIC_kwDOR0p8gM4C8bgi
    mapping: pathname
    strict: 0
    input_position: bottom
    lang: ko
    reactions_enabled: 1

paginate: 10

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

sass:
  style: compressed
  sourcemap: never

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

plugins:
  - jekyll-paginate
  - jekyll-archives
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-polyglot

exclude:
  - Gemfile
  - Gemfile.lock
  - docs
  - tools
  - README.md
  - LICENSE
  - node_modules

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
