<style>
  .post-content { font-size: 0.95rem; line-height: 1.8; }
  .post-content h2 { font-size: 1.4rem; }
  .post-content h3 { font-size: 1.2rem; }
  .post-content h4 { font-size: 1.05rem; }
  #sidebar .profile-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  #sidebar .site-title { text-align: center !important; width: 100%; }
  #sidebar .site-subtitle { text-align: center !important; width: 100%; }
  #sidebar .sidebar-bottom {
    position: absolute;
    bottom: 2rem;
    left: 0;
    width: 100%;
    justify-content: center;
  }
  pre:has(+ .mermaid) { display: none !important; }
  .highlight .language-mermaid { display: none !important; }
  .lang-switch-btn {
    display: block;
    text-align: center;
    margin-bottom: 0.8rem;
    padding: 0.3rem 0.8rem;
    border: 1px solid rgba(128,128,128,0.3);
    border-radius: 0.4rem;
    font-size: 0.8rem;
    text-decoration: none !important;
    color: inherit !important;
    opacity: 0.7;
    transition: opacity 0.2s;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }
  .lang-switch-btn:hover { opacity: 1; }
</style>

<script>
(function() {
  var path = window.location.pathname;
  var isEn = path.startsWith('/en/') || path === '/en';

  function addLangButton() {
    if (document.querySelector('.lang-switch-btn')) return;
    var sidebarBottom = document.querySelector('#sidebar .sidebar-bottom');
    if (!sidebarBottom) return;

    if (isEn) {
      var subtitle = document.querySelector('.site-subtitle');
      if (subtitle) subtitle.textContent = "A Backend Engineer's Field Notes";
    }

    var langBtn = document.createElement('a');
    langBtn.className = 'lang-switch-btn';

    if (isEn) {
      var koPath = path.replace(/^\/en(\/|$)/, '/');
      if (koPath === '') koPath = '/';
      langBtn.href = koPath;
      langBtn.innerHTML = '🇰🇷 한국어';
    } else {
      var enPath = '/en' + (path === '/' ? '/' : path);
      langBtn.href = enPath;
      langBtn.innerHTML = '🇺🇸 English';
    }

    sidebarBottom.insertBefore(langBtn, sidebarBottom.firstChild);
  }

  document.addEventListener('DOMContentLoaded', addLangButton);
  window.addEventListener('load', addLangButton);
  setTimeout(addLangButton, 500);
  setTimeout(addLangButton, 1500);
})();
</script>
