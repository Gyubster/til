<style>
  /* 본문 폰트 사이즈 */
  .post-content { font-size: 0.95rem; line-height: 1.8; }
  .post-content h2 { font-size: 1.4rem; }
  .post-content h3 { font-size: 1.2rem; }
  .post-content h4 { font-size: 1.05rem; }

  /* 사이드바 프로필 중앙 정렬 */
  #sidebar .profile-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  #sidebar .site-title {
    text-align: center !important;
    width: 100%;
  }
  #sidebar .site-subtitle {
    text-align: center !important;
    width: 100%;
  }

  /* 사이드바 하단 고정 + 중앙 정렬 */
  #sidebar .sidebar-bottom {
    position: absolute;
    bottom: 2rem;
    left: 0;
    width: 100%;
    justify-content: center;
  }

  /* Mermaid 코드 블록 숨기기 */
  pre:has(+ .mermaid) { display: none !important; }
  .highlight .language-mermaid { display: none !important; }

  /* 언어 전환 버튼 */
  .lang-switch-btn {
    display: block;
    text-align: center;
    margin-bottom: 0.8rem;
    padding: 0.3rem 0.8rem;
    border: 1px solid rgba(128,128,128,0.3);
    border-radius: 0.4rem;
    font-size: 0.8rem;
    text-decoration: none !important;
    color: inherit !important;
    opacity: 0.7;
    transition: opacity 0.2s;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }
  .lang-switch-btn:hover { opacity: 1; }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var path = window.location.pathname;
  var isEn = path.startsWith('/en/') || path === '/en';

  // 영문 페이지: tagline 변경
  if (isEn) {
    var subtitle = document.querySelector('.site-subtitle');
    if (subtitle) subtitle.textContent = "A Backend Engineer's Field Notes";
  }

  // 언어 전환 버튼
  var sidebarBottom = document.querySelector('#sidebar .sidebar-bottom');
  if (sidebarBottom) {
    var langBtn = document.createElement('a');
    langBtn.className = 'lang-switch-btn';

    if (isEn) {
      // 영문 → 한글: /en/ 프리픽스 제거
      var koPath = path.replace(/^\/en(\/|$)/, '/');
      if (koPath === '') koPath = '/';
      langBtn.href = koPath;
      langBtn.textContent = '🇰🇷 한국어';
    } else {
      // 한글 → 영문: /en/ 프리픽스 추가
      var enPath = '/en' + (path === '/' ? '/' : path);
      langBtn.href = enPath;
      langBtn.textContent = '🇺🇸 English';
    }

    sidebarBottom.insertBefore(langBtn, sidebarBottom.firstChild);
  }
});
</script>
