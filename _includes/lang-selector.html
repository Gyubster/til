<div class="lang-selector" style="text-align:center; margin: 0.5rem 0;">
  {% for lang in site.languages %}
    {% if lang == site.active_lang %}
      <span style="font-weight:bold; margin: 0 0.3rem;">
        {% if lang == 'ko' %}🇰🇷{% elsif lang == 'en' %}🇺🇸{% else %}{{ lang }}{% endif %}
      </span>
    {% else %}
      <a href="{% if lang == site.default_lang %}{{ page.url }}{% else %}/{{ lang }}{{ page.url }}{% endif %}"
         style="margin: 0 0.3rem; opacity: 0.6;">
        {% if lang == 'ko' %}🇰🇷{% elsif lang == 'en' %}🇺🇸{% else %}{{ lang }}{% endif %}
      </a>
    {% endif %}
  {% endfor %}
</div>
